<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slime.io - Dashboard</title>
    <style>
        :root {
            --bg-dark: #050a05;
            --bg-card: #0a110a;
            --green-slime: #2ecc71;
            --green-dark: #145a32;
            --text-light: #fdfdfd;
            --text-muted: #888;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        
        body {
            background-color: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .mobile-app {
            width: 100%; max-width: 420px; height: 100vh;
            background: linear-gradient(180deg, var(--bg-dark) 0%, #000000 100%);
            border: 1px solid #1a1a1a; padding: 20px; display: flex; flex-direction: column;
            position: relative; overflow-y: auto; box-shadow: 0 0 40px rgba(46, 204, 113, 0.05);
        }

        .slime-drip {
            position: absolute; top: 0; left: 0; width: 100%; height: 5px;
            background: var(--green-slime); box-shadow: 0 5px 20px var(--green-slime);
        }

        /* رأس الصفحة (البروفايل) */
        .header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; margin-top: 15px;
        }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar {
            width: 50px; height: 50px; border-radius: 12px; background: #111;
            border: 2px solid var(--green-slime); box-shadow: 0 0 10px rgba(46, 204, 113, 0.2);
            display: flex; justify-content: center; align-items: center; font-size: 24px;
        }
        .username { color: white; font-size: 18px; font-weight: bold; }
        .level { color: var(--green-slime); font-size: 13px; font-weight: 600; }

        /* قسم الإحصائيات (المال والـ XP) */
        .stats-container {
            background: var(--bg-card); border: 1px solid #1f331f; border-radius: 16px; padding: 15px; margin-bottom: 25px;
        }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center; }
        .stat-title { color: var(--text-muted); font-size: 14px; }
        .stat-value { color: white; font-size: 16px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .money-icon { color: #f1c40f; }
        
        .xp-bar-bg { width: 100%; height: 8px; background: #111; border-radius: 10px; overflow: hidden; margin-top: 5px; }
        .xp-bar-fill { width: 45%; height: 100%; background: var(--green-slime); box-shadow: 0 0 10px var(--green-slime); }

        /* زر اللعب الرئيسي */
        .play-btn {
            width: 100%; padding: 20px; border: none; border-radius: 16px;
            background: var(--green-slime); color: #000; font-size: 22px; font-weight: 900;
            cursor: pointer; box-shadow: 0 5px 25px rgba(46, 204, 113, 0.4); margin-bottom: 25px;
            transition: 0.2s; text-transform: uppercase; letter-spacing: 2px;
        }
        .play-btn:active { transform: scale(0.97); }

        /* شبكة القوائم (المتجر، الهدايا، إلخ) */
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .menu-item {
            background: var(--bg-card); border: 1px solid #1f331f; border-radius: 14px;
            padding: 15px; text-align: center; cursor: pointer; transition: 0.2s;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .menu-item:hover { border-color: var(--green-slime); background: #111e11; }
        .menu-item svg { width: 28px; height: 28px; fill: var(--green-slime); }
        .menu-item span { color: white; font-size: 14px; font-weight: 600; }

        /* زر تسجيل الخروج */
        .logout-btn {
            margin-top: auto; width: 100%; padding: 15px; border: 1px solid #333;
            border-radius: 12px; background: transparent; color: #ff4757;
            font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .logout-btn:hover { background: rgba(255, 71, 87, 0.1); border-color: #ff4757; }

    </style>
</head>
<body>

<div class="mobile-app">
    <div class="slime-drip"></div>
    
    <div class="header">
        <div class="user-info">
            <div class="avatar">👾</div>
            <div>
                <div class="username" id="displayUsername">Player_Slime</div>
                <div class="level">المستوى 12</div>
            </div>
        </div>
        <div style="cursor: pointer;" title="الإعدادات">⚙️</div>
    </div>

    <div class="stats-container">
        <div class="stat-row">
            <span class="stat-title">الرصيد</span>
            <span class="stat-value"><span class="money-icon">💰</span> 2,450</span>
        </div>
        <div class="stat-row" style="margin-bottom: 0; margin-top: 15px;">
            <span class="stat-title">الخبرة (XP)</span>
            <span class="stat-value">450 / 1000</span>
        </div>
        <div class="xp-bar-bg"><div class="xp-bar-fill"></div></div>
    </div>

    <button class="play-btn" onclick="startGame()">▶ العب الآن</button>

    <div class="menu-grid">
        <div class="menu-item">
            <svg viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/></svg>
            <span>المتجر (Shop)</span>
        </div>
        <div class="menu-item">
            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V8h16v10zm-2-1h-4v-2h4v2zm0-4h-4v-2h4v2zm-6 4H8v-2h4v2zm0-4H8v-2h4v2z"/></svg>
            <span>الحقيبة (Items)</span>
        </div>
        <div class="menu-item">
            <svg viewBox="0 0 24 24"><path d="M20 6h-2.18c.11-.31.18-.65.18-1 0-1.66-1.34-3-3-3-1.05 0-1.96.54-2.5 1.35l-.5.67-.5-.68C10.96 2.54 10.05 2 9 2 7.34 2 6 3.34 6 5c0 .35.07.69.18 1H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-5-2c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zM9 4c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm11 15H4v-2h16v2zm0-5H4V8h5.08L7 10.83 8.62 12 11 8.76l1-1.36 1 1.36L15.38 12 17 10.83 14.92 8H20v6z"/></svg>
            <span>الهدايا (Gifts)</span>
        </div>
        <div class="menu-item">
            <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/></svg>
            <span>الفعاليات (Events)</span>
        </div>
    </div>

    <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
</div>

<script>
    // هذه الدالة ستنقل اللاعب إلى شاشة محرك اللعبة لاحقاً (مثلاً game.html)
    function startGame() {
        alert("جاري الاتصال بخادم اللعبة...");
        // window.location.href = 'game.html';
    }

    // دالة تسجيل الخروج البسيطة (تحذف الكوكيز مؤقتاً بالواجهة وترجع لصفحة الدخول)
    function logout() {
        if(confirm("هل أنت متأكد أنك تريد تسجيل الخروج؟")) {
            // مسح أي بيانات محلية مسجلة إن وجدت
            localStorage.clear();
            sessionStorage.clear();
            // مسار تسجيل الخروج سيتم إضافته لاحقاً للخادم لمسح الـ HttpOnly Cookie
            window.location.href = 'index.html';
        }
    }

    // ملاحظة برمجية: لاحقاً سنقوم بإضافة كود Fetch بسيط هنا 
    // يرسل طلب GET إلى الخادم لجلب معلومات اللاعب الحقيقية (المال، الـ XP) من قاعدة بيانات Supabase.
</script>
</body>
</html>
