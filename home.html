<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>SkyData — Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    :root { --sky-green: #00ff88; --sky-glow: rgba(0,255,136,0.3); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Rajdhani', sans-serif; background: #000; color: white; overflow: hidden; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
    
    @media screen and (orientation: portrait) {
      body::before { content: "Please rotate to landscape"; position: fixed; inset: 0; background: #000; color: var(--sky-green); display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-size: 1.2rem; z-index: 99999; }
    }

    .bg-container { position: fixed; inset: 0; background: radial-gradient(ellipse at center, #0d2818 0%, #000 100%); z-index: -2; }
    .phone-card { width: 100%; max-width: 420px; height: 100%; max-height: 280px; background: linear-gradient(135deg, rgba(10,30,15,0.95), rgba(5,15,8,0.98)); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; box-shadow: 0 0 40px rgba(0,255,136,0.1); backdrop-filter: blur(20px); position: relative; overflow: hidden; display: flex; flex-direction: column; padding: 1.5rem; }
    .neon-text { color: var(--sky-green); text-shadow: 0 0 10px var(--sky-glow); }
    .btn-glass { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; transition: all 0.3s; }
    .btn-glass:hover { border-color: var(--sky-green); box-shadow: 0 0 20px var(--sky-glow); }
    .btn-danger { background: rgba(220,38,38,0.2); border: 1px solid rgba(220,38,38,0.5); color: #fca5a5; transition: all 0.3s; }
    .btn-danger:hover { background: rgba(220,38,38,0.3); box-shadow: 0 0 20px rgba(220,38,38,0.3); }
    
    .toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
    .toast { padding: 0.75rem 1.25rem; border-radius: 8px; font-weight: 600; font-size: 0.9rem; animation: slideIn 0.3s ease; min-width: 280px; border: 1px solid; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .toast-error { background: rgba(220,38,38,0.15); border-color: rgba(220,38,38,0.5); color: #fca5a5; }
    .toast-success { background: rgba(0,255,136,0.1); border-color: var(--sky-green); color: var(--sky-green); }
    
    .loader { width: 40px; height: 40px; border: 3px solid transparent; border-top-color: var(--sky-green); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 0.75rem; text-align: center; }
  </style>
</head>
<body>
  <div class="bg-container"></div>
  <div class="toast-container" id="toastContainer"></div>

  <!-- Loading Screen -->
  <div id="loadingScreen" class="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center gap-4">
    <div class="loader"></div>
    <p class="font-orbitron text-sm text-white/60 tracking-widest">AUTHENTICATING...</p>
  </div>

  <!-- Main Card -->
  <div class="phone-card" id="mainCard" style="display:none;">
    <!-- Header -->
    <div class="flex items-center justify-between mb-3">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-sky-green to-green-600 flex items-center justify-center text-black font-bold font-orbitron" id="userAvatar">
          S
        </div>
        <div>
          <h1 class="font-orbitron text-sm font-bold text-white leading-tight" id="userName">Loading...</h1>
          <p class="text-[10px] text-white/40 font-rajdhani" id="userEmail">...</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <span class="px-2 py-0.5 rounded text-[10px] font-bold bg-sky-green/20 text-sky-green border border-sky-green/30" id="authMethod">EMAIL</span>
      </div>
    </div>

    <!-- Stats Grid -->
    <div class="grid grid-cols-3 gap-2 mb-3">
      <div class="stat-card">
        <p class="text-[10px] text-white/40 uppercase tracking-wider">Level</p>
        <p class="font-orbitron text-lg font-bold text-sky-green" id="userLevel">1</p>
      </div>
      <div class="stat-card">
        <p class="text-[10px] text-white/40 uppercase tracking-wider">XP</p>
        <p class="font-orbitron text-lg font-bold text-white" id="userXP">0</p>
      </div>
      <div class="stat-card">
        <p class="text-[10px] text-white/40 uppercase tracking-wider">Money</p>
        <p class="font-orbitron text-lg font-bold text-yellow-400" id="userMoney">0</p>
      </div>
    </div>

    <!-- Actions -->
    <div class="flex flex-col gap-2 flex-1">
      <button onclick="goToLogs()" id="adminBtn" class="btn-glass py-2 px-4 rounded-lg flex items-center justify-center gap-2 font-rajdhani font-semibold text-xs hidden">
        <svg class="w-4 h-4 text-sky-green" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        Admin Dashboard
      </button>
      
      <button onclick="handleLogout()" class="btn-danger py-2 px-4 rounded-lg flex items-center justify-center gap-2 font-rajdhani font-semibold text-xs mt-auto">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Sign Out
      </button>
    </div>
  </div>

  <script>
    const CONFIG = {
      SUPABASE_URL: '',
      SUPABASE_ANON_KEY: '',
      API_URL: '',
    };

    let supabase = null;
    if (CONFIG.SUPABASE_URL && CONFIG.SUPABASE_ANON_KEY) {
      supabase = supabaseJs.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
    }

    function showToast(message, type = 'error') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      const icon = type === 'success' 
        ? '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>'
        : '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>';
      toast.innerHTML = `${icon}<span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 5000);
    }

    async function init() {
      if (!supabase) {
        showToast('Configuration error', 'error');
        return;
      }

      // Check OAuth callback
      const { data: { session }, error: sessionError } = await supabase.auth.getSession();
      
      if (sessionError || !session) {
        // No session, redirect to login
        window.location.href = 'index.html';
        return;
      }

      const user = session.user;
      const email = user.email;

      // Fetch profile from database
      const { data: profile, error: profileError } = await supabase
        .from('profiles')
        .select('*')
        .eq('id', user.id)
        .single();

      // Handle OAuth conflict check
      if (profile) {
        // User exists in profiles
        if (profile.auth_method === 'email' && user.app_metadata?.provider === 'google') {
          // Email user signing in with Google — ALLOW (linking)
          showToast('Linked Google to your account!', 'success');
        } else if (profile.auth_method === 'google' && user.app_metadata?.provider === 'email') {
          // Google user trying email — BLOCK
          await supabase.auth.signOut();
          localStorage.setItem('auth_error', 'This email is already linked to a Google account. Please use Google Sign-In.');
          window.location.href = 'index.html';
          return;
        }
      } else {
        // New OAuth user, create profile
        const metadata = user.user_metadata || {};
        const { error: insertError } = await supabase.from('profiles').insert({
          id: user.id,
          username: metadata.full_name || metadata.name || email.split('@')[0],
          auth_method: 'google',
          email: email
        });
        if (insertError) console.error('Profile creation error:', insertError);
      }

      // Update last seen
      await supabase.from('sessions').upsert({
        user_id: user.id,
        ip_address: 'client-side',
        last_seen: new Date().toISOString()
      }, { onConflict: 'user_id' });

      // Send fingerprint
      try {
        await fetch(`${CONFIG.API_URL}/fingerprint.js`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userId: user.id,
            fingerprint: getFingerprint(),
            action: 'oauth_login'
          })
        });
      } catch (e) {}

      // Render user data
      renderUser(profile || { username: email.split('@')[0], level: 1, xp: 0, money: 0, auth_method: user.app_metadata?.provider || 'email' }, user);

      // Check admin
      checkAdmin(email);

      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('mainCard').style.display = 'flex';
    }

    function renderUser(profile, user) {
      document.getElementById('userName').textContent = profile.username || profile.display_name || user.email.split('@')[0];
      document.getElementById('userEmail').textContent = user.email;
      document.getElementById('userLevel').textContent = profile.level || 1;
      document.getElementById('userXP').textContent = profile.xp || 0;
      document.getElementById('userMoney').textContent = (profile.money || 0).toLocaleString();
      document.getElementById('authMethod').textContent = (profile.auth_method || 'EMAIL').toUpperCase();
      document.getElementById('userAvatar').textContent = (profile.username || user.email)[0].toUpperCase();
    }

    async function checkAdmin(email) {
      try {
        const res = await fetch(`${CONFIG.API_URL}/logs.js?action=check&adminEmail=${encodeURIComponent(email)}`);
        const data = await res.json();
        if (data.isAdmin) {
          document.getElementById('adminBtn').classList.remove('hidden');
        }
      } catch (e) {}
    }

    function goToLogs() {
      window.location.href = 'logs.html';
    }

    async function handleLogout() {
      await supabase.auth.signOut();
      // Clear cookies if any
      document.cookie.split(';').forEach(c => {
        const [name] = c.split('=');
        document.cookie = `${name.trim()}=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;`;
      });
      window.location.href = 'index.html';
    }

    function getFingerprint() {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      ctx.textBaseline = 'top';
      ctx.font = '14px Arial';
      ctx.fillText('SkyData', 2, 2);
      
      let webgl = 'unknown';
      try {
        const gl = document.createElement('canvas').getContext('webgl');
        if (gl) {
          const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
          if (debugInfo) webgl = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
        }
      } catch (e) {}

      return {
        userAgent: navigator.userAgent,
        screenResolution: `${screen.width}x${screen.height}`,
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        language: navigator.language,
        hardwareConcurrency: navigator.hardwareConcurrency || 'unknown',
        deviceMemory: navigator.deviceMemory || 'unknown',
        canvasFingerprint: canvas.toDataURL().slice(-50),
        webglRenderer: webgl,
        deviceId: localStorage.getItem('deviceId') || (() => {
          const id = crypto.randomUUID();
          localStorage.setItem('deviceId', id);
          return id;
        })()
      };
    }

    init();
  </script>
</body>
</html>
