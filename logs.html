<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title> <style>
        /* التصميم الافتراضي: صفحة 404 بيضاء عادية للتمويه التام */
        body { font-family: sans-serif; text-align: center; margin-top: 50px; background: white; color: black; transition: all 0.3s ease; }
        .hidden-content { display: none; }

        /* تصميم لوحة الإدارة الفخمة (يتم تفعيله برمجياً فقط للمدير) */
        .admin-mode { background-color: #050a05; color: #fdfdfd; text-align: right; padding: 30px; font-family: system-ui, -apple-system, sans-serif; }
        .admin-mode #default-404 { display: none; }
        .admin-mode .hidden-content { display: block; }
        
        .header-logs { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #145a32; padding-bottom: 15px; margin-bottom: 25px; }
        .header-logs h2 { color: #2ecc71; margin: 0; text-shadow: 0 0 15px rgba(46, 204, 113, 0.4); font-size: 28px; }
        
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: #0a110a; border-radius: 12px; overflow: hidden; box-shadow: 0 0 30px rgba(46, 204, 113, 0.05); }
        th { background: #111e11; color: #2ecc71; padding: 18px; border-bottom: 1px solid #1f331f; font-size: 15px; text-align: right; }
        td { padding: 18px; border-bottom: 1px solid #1f331f; font-size: 14px; color: #ccc; }
        tr:hover td { background: #111; color: white; }
        
        .action-success { color: #2ecc71; font-weight: bold; background: rgba(46, 204, 113, 0.1); padding: 5px 10px; border-radius: 5px; }
        .action-alert { color: #ff4757; font-weight: bold; background: rgba(255, 71, 87, 0.1); padding: 5px 10px; border-radius: 5px; }
        .fingerprint-text { font-family: monospace; font-size: 12px; color: #666; word-break: break-all; max-width: 200px; }
    </style>
</head>
<body>

<div id="default-404">
    <h1>404 Not Found</h1>
    <p>The requested URL was not found on this server.</p>
</div>

<div id="admin-panel" class="hidden-content">
    <div class="header-logs">
        <h2>نظام السجلات والمراقبة الأمنية</h2>
        <div style="color: #888; font-size: 14px; display: flex; align-items: center; gap: 10px;">
            <span style="display:inline-block; width:10px; height:10px; background:#2ecc71; border-radius:50%; box-shadow: 0 0 10px #2ecc71;"></span>
            المدير: brxpara@gmail.com
        </div>
    </div>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>الوقت والتاريخ</th>
                    <th>البريد الإلكتروني</th>
                    <th>الحدث</th>
                    <th>IP / الدولة</th>
                    <th>بصمة الجهاز (Device ID)</th>
                </tr>
            </thead>
            <tbody id="logs-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    // رابط الخادم الخاص بك للتحقق وجلب السجلات
    const API_URL = 'https://slime-secure-api.onrender.com/api/admin/logs';

    async function loadLogs() {
        try {
            // إرسال الطلب مع إرفاق الكوكيز الآمنة الخاصة بتسجيل الدخول
            const res = await fetch(API_URL, { 
                method: 'GET',
                credentials: 'include' 
            });
            
            // إذا رد الخادم بـ 404 (وهي رسالة الخادم إذا لم يكن الزائر هو المدير)، نترك الصفحة وهمية
            if (res.status === 404 || !res.ok) {
                return; 
            }

            const data = await res.json();
            
            if (data.success) {
                // الكشف عن الواجهة الحقيقية
                document.title = "Slime.io - Security Logs";
                document.body.classList.add('admin-mode');

                let rows = '';
                data.logs.forEach(log => {
                    // تحديد لون الحدث (أخضر للنجاح، أحمر للأحداث الأخرى)
                    let actionClass = log.action.includes('SUCCESS') ? 'action-success' : 'action-alert';
                    
                    // تنسيق الوقت
                    let dateObj = new Date(log.created_at);
                    let formattedDate = dateObj.toLocaleDateString('ar-EG') + '<br><span style="color:#666;font-size:12px;">' + dateObj.toLocaleTimeString('ar-EG') + '</span>';

                    rows += `<tr>
                        <td dir="ltr" style="text-align: right;">${formattedDate}</td>
                        <td style="color: #fff; font-weight: 500;">${log.users?.email || 'غير معروف'}</td>
                        <td><span class="${actionClass}">${log.action}</span></td>
                        <td dir="ltr" style="text-align: right;">${log.ip_address} <br> <span style="font-size:12px; color:#888;">${log.country}</span></td>
                        <td class="fingerprint-text">${log.device_fingerprint}</td>
                    </tr>`;
                });
                
                document.getElementById('logs-body').innerHTML = rows;
            }
        } catch (e) {
            // صمت تام في حال فشل الاتصال لعدم إثارة الشكوك
        }
    }

    loadLogs();
</script>
</body>
</html>
