<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - غير موجود</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(160deg, #0d5c2e, #2ecc71, #f0f0f0);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      direction: rtl;
    }
    .error-box h1 { font-size: 80px; color: white; text-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .error-box p { color: rgba(255,255,255,0.9); font-size: 18px; margin: 10px 0 30px; }
    .error-box a {
      display: inline-block; padding: 12px 30px; background: white; color: #1a5c2e;
      text-decoration: none; border-radius: 10px; font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="error-box">
    <h1>404</h1>
    <p>الصفحة التي تبحث عنها غير موجودة</p>
    <a href="/index.html">العودة للرئيسية</a>
  </div>
</body>
</html>
