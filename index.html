<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkyData Auth | منصة التحقق</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ffcc;
            --dark-green: #0a2e1f;
            --bg-black: #050505;
            --glass-bg: rgba(10, 46, 31, 0.6);
            --glass-border: rgba(0, 255, 204, 0.3);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Orbitron', sans-serif; user-select: none; }

        body {
            background: radial-gradient(circle at center, var(--dark-green) 0%, var(--bg-black) 100%);
            color: var(--text-main);
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; position: relative;
        }

        /* شبكة الخلفية */
        body::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(var(--glass-border) 1px, transparent 1px), linear-gradient(90deg, var(--glass-border) 1px, transparent 1px);
            background-size: 40px 40px; opacity: 0.1; z-index: 0;
        }

        #landscape-lock {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-black); z-index: 9999;
            flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        @media screen and (orientation: portrait) {
            #landscape-lock { display: flex; }
            .auth-container { display: none; }
        }

        .auth-container {
            position: relative; z-index: 10;
            width: 90%; max-width: 800px; height: 90%; max-height: 450px;
            background: var(--glass-bg); backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 16px;
            display: flex; overflow: hidden;
        }

        .panel {
            width: 100%; height: 100%; padding: 30px 40px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: all 0.4s ease-in-out; position: absolute; top: 0; left: 0;
            opacity: 0; visibility: hidden; pointer-events: none; transform: scale(0.95);
        }

        .active-panel { opacity: 1; visibility: visible; pointer-events: all; transform: scale(1); z-index: 20; }

        h1 { font-size: 26px; margin-bottom: 25px; text-transform: uppercase; text-shadow: 0 0 10px var(--neon-green); }

        .btn {
            width: 100%; max-width: 320px; padding: 12px 20px; margin-bottom: 12px;
            background: rgba(0, 0, 0, 0.5); border: 1px solid var(--glass-border);
            color: var(--text-main); border-radius: 8px; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 15px;
            transition: 0.3s;
        }

        .btn:hover { background: var(--glass-border); box-shadow: 0 0 15px var(--glass-border); transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 1px dashed var(--neon-green); color: var(--neon-green); }

        .input-group { width: 100%; max-width: 320px; margin-bottom: 12px; }
        .input-group input {
            width: 100%; padding: 10px 15px; background: rgba(0, 0, 0, 0.4); border: 1px solid #333;
            color: white; border-radius: 6px; outline: none; transition: 0.3s; text-align: left;
        }
        .input-group input:focus { border-color: var(--neon-green); box-shadow: 0 0 10px rgba(0, 255, 204, 0.2); }

        .back-btn { position: absolute; top: 20px; left: 20px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <div id="landscape-lock">
        <h2 style="color: var(--neon-green);">يرجى تدوير الهاتف</h2>
        <p style="color: var(--text-muted); margin-top: 10px;">يتطلب النظام الوضع الأفقي للعمل.</p>
    </div>

    <div class="auth-container">
        <div id="main-panel" class="panel active-panel">
            <h1>SKYDATA AUTH</h1>
            <button class="btn" id="btn-google-login">دخول عبر جوجل</button>
            <button class="btn" onclick="switchPanel('login-panel')">دخول عبر البريد</button>
            <button class="btn btn-outline" onclick="switchPanel('register-panel')">إنشاء حساب جديد</button>
        </div>

        <div id="login-panel" class="panel">
            <button class="back-btn" onclick="switchPanel('main-panel')">◀ رجوع</button>
            <h1>تسجيل الدخول</h1>
            <div class="input-group"><input type="email" id="login-email" placeholder="البريد الإلكتروني"></div>
            <div class="input-group"><input type="password" id="login-password" placeholder="كلمة المرور"></div>
            <button class="btn" id="btn-submit-login" style="background: var(--neon-green); color: #000;">دخول النظام</button>
        </div>

        <div id="register-panel" class="panel">
            <button class="back-btn" onclick="switchPanel('main-panel')">◀ رجوع</button>
            <h1>إنشاء حساب</h1>
            <div style="display: flex; gap: 10px; width: 100%; max-width: 320px;">
                <div class="input-group"><input type="text" id="register-username" placeholder="اسم المستخدم"></div>
                <div class="input-group"><input type="email" id="register-email" placeholder="البريد"></div>
            </div>
            <div style="display: flex; gap: 10px; width: 100%; max-width: 320px;">
                <div class="input-group"><input type="password" id="register-password" placeholder="كلمة المرور"></div>
                <div class="input-group"><input type="password" id="register-confirm" placeholder="تأكيد"></div>
            </div>
            <label style="font-size: 10px; color: var(--text-muted); margin-bottom: 10px;">
                <input type="checkbox" id="register-terms"> أوافق على الشروط والخصوصية
            </label>
            <button class="btn" id="btn-submit-register" style="background: var(--neon-green); color: #000;">تفعيل الحساب</button>
        </div>
    </div>

    <script>
        function switchPanel(id) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-panel'));
            document.getElementById(id).classList.add('active-panel');
        }

        window.showToast = (msg, type) => {
            const t = document.createElement('div');
            t.style.cssText = `position:fixed;top:20px;right:20px;background:${type==='error'?'#f03':'#0fc'};color:#000;padding:15px;border-radius:8px;z-index:10000;font-weight:bold;`;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 4000);
        }
    </script>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        const supabase = createClient('https://fkdcbrkokzfwluzrrshb.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrZGNicmtva3pmd2x1enJyc2hiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMzE2NTUsImV4cCI6MjA5MjYwNzY1NX0.cDk3vsFLpZR_rZBq8d_cZZYEXnJIcImz5yuYIDYoZdY');

        document.getElementById('btn-google-login').onclick = async () => {
            await supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + '/home.html' } });
        }

        async function auth(type) {
            const btn = document.getElementById(type === 'login' ? 'btn-submit-login' : 'btn-submit-register');
            const data = type === 'login' ? {
                action: 'login',
                email: document.getElementById('login-email').value,
                password: document.getElementById('login-password').value
            } : {
                action: 'register',
                username: document.getElementById('register-username').value,
                email: document.getElementById('register-email').value,
                password: document.getElementById('register-password').value,
                confirm: document.getElementById('register-confirm').value,
                terms: document.getElementById('register-terms').checked
            };

            if (type === 'register' && data.password !== data.confirm) return showToast('كلمات المرور غير متطابقة', 'error');

            btn.disabled = true;
            try {
                const res = await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.success) {
                    showToast('تمت العملية بنجاح!', 'success');
                    setTimeout(() => location.href = '/home.html', 1000);
                } else showToast(result.error, 'error');
            } catch (e) { showToast('خطأ في الاتصال بالخادم', 'error'); }
            btn.disabled = false;
        }

        document.getElementById('btn-submit-login').onclick = () => auth('login');
        document.getElementById('btn-submit-register').onclick = () => auth('register');
    </script>
</body>
</html>
