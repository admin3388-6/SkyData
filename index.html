<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slime.io - Secure Login</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://www.google.com/recaptcha/api.js?render=ضع_مفتاح_الموقع_هنا"></script>

    <style>
        :root {
            --bg-dark: #020502;
            --bg-gradient: #0a1c0a;
            --green-slime: #2ecc71;
            --green-dark: #145a32;
            --green-glow: #34e77d;
            --text-light: #fdfdfd;
            --input-bg: #0d140d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        
        body {
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        /* الحاوية الرئيسية (حجم الهاتف) */
        .mobile-app {
            width: 100%; max-width: 400px; height: 100vh;
            background: linear-gradient(160deg, var(--bg-gradient) 0%, var(--bg-dark) 100%);
            border: 1px solid #112211; padding: 35px 25px;
            display: flex; flex-direction: column; position: relative; overflow-y: auto;
            box-shadow: 0 0 50px rgba(46, 204, 113, 0.08); z-index: 10;
        }

        /* تأثيرات السلايم المتحركة في الخلفية */
        .slime-blob {
            position: absolute; border-radius: 50%; background: var(--green-slime);
            filter: blur(40px); opacity: 0.15; z-index: -1; animation: float 6s infinite ease-in-out alternate;
        }
        .blob1 { width: 150px; height: 150px; top: -20px; right: -20px; }
        .blob2 { width: 200px; height: 200px; bottom: -50px; left: -50px; animation-delay: -3s; }
        @keyframes float { 0% { transform: translateY(0) scale(1); } 100% { transform: translateY(20px) scale(1.1); } }

        .logo {
            text-align: center; font-size: 42px; font-weight: 900; color: white;
            text-shadow: 0 0 25px var(--green-dark); margin-bottom: 40px; letter-spacing: 1px;
        }
        .logo span { color: var(--green-glow); }

        .form-group { margin-bottom: 18px; width: 100%; }
        
        .input-field {
            width: 100%; padding: 16px; background: var(--input-bg);
            border: 1px solid #1f331f; border-radius: 12px; color: white;
            font-size: 15px; outline: none; transition: 0.3s;
        }
        .input-field:focus { border-color: var(--green-slime); box-shadow: 0 0 15px rgba(46, 204, 113, 0.2); }

        .btn {
            width: 100%; padding: 16px; border: none; border-radius: 12px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 12px; transition: 0.2s;
        }
        .btn-green { background: var(--green-slime); color: #000; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.25); }
        .btn-green:active { transform: scale(0.98); }
        .btn-green:disabled { background: #1f331f; color: #555; cursor: not-allowed; box-shadow: none; }
        
        .btn-google { background: #ffffff; color: #333; margin-bottom: 25px; }
        .btn-google svg { width: 22px; height: 22px; }

        .divider { display: flex; align-items: center; text-align: center; color: #666; font-size: 13px; margin: 20px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #222; }
        .divider:not(:empty)::before { margin-left: 10px; }
        .divider:not(:empty)::after { margin-right: 10px; }

        .footer-links { display: flex; justify-content: space-between; margin-top: 20px; font-size: 13px; font-weight: 600; }
        .footer-links span { color: var(--green-slime); cursor: pointer; transition: 0.2s; }
        .footer-links span:hover { text-shadow: 0 0 10px var(--green-slime); }

        /* نوافذ منبثقة (Modals) */
        .modal {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; justify-content: center; padding: 25px;
            backdrop-filter: blur(5px);
        }
        .modal h2 { color: var(--green-glow); text-align: center; margin-bottom: 20px; font-size: 22px; }
        .modal p { color: #aaa; text-align: center; font-size: 13px; margin-bottom: 20px; line-height: 1.5; }
        
        .otp-container { display: flex; gap: 8px; justify-content: center; margin-bottom: 25px; direction: ltr; }
        .otp-container input {
            width: 45px; height: 55px; text-align: center; font-size: 24px; font-weight: bold;
            background: var(--input-bg); border: 2px solid #1f331f; color: white; border-radius: 10px; transition: 0.3s;
        }
        .otp-container input:focus { border-color: var(--green-slime); outline: none; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="mobile-app">
    <div class="slime-blob blob1"></div>
    <div class="slime-blob blob2"></div>

    <div class="logo">Slime<span>.io</span></div>

    <button class="btn btn-google" onclick="loginWithGoogle()">
        <svg viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        تسجيل الدخول باستخدام جوجل
    </button>

    <div class="divider">أو عبر البريد الإلكتروني</div>

    <div class="form-group hidden" id="usernameBox">
        <input type="text" id="username" class="input-field" placeholder="اسم المستخدم (إنجليزي وأرقام فقط)">
    </div>
    <div class="form-group">
        <input type="email" id="email" class="input-field" placeholder="البريد الإلكتروني">
    </div>
    <div class="form-group">
        <input type="password" id="password" class="input-field" placeholder="كلمة المرور">
    </div>

    <button class="btn btn-green" id="mainBtn" onclick="submitData()">تسجيل الدخول</button>

    <div class="footer-links">
        <span onclick="showModal('forgotModal')">نسيت كلمة السر؟</span>
        <span id="toggleBtn" onclick="toggleMode()">إنشاء حساب جديد</span>
    </div>

    <div id="forgotModal" class="modal">
        <h2>استعادة حسابك</h2>
        <p>أدخل بريدك الإلكتروني وسنرسل لك رمزاً لتأكيد هويتك وتغيير كلمة المرور بشكل آمن.</p>
        <input type="email" id="forgotEmail" class="input-field" placeholder="البريد الإلكتروني" style="margin-bottom: 20px;">
        <button class="btn btn-green" id="sendOtpBtn" onclick="sendOTP()">إرسال رمز التحقق</button>
        <button class="btn" style="background:#111; color:white; margin-top:10px; border: 1px solid #333;" onclick="closeModal('forgotModal')">إلغاء</button>
    </div>

    <div id="otpModal" class="modal">
        <h2>تأكيد الرمز</h2>
        <p>تم إرسال رمز من 6 أرقام إلى بريدك. تنتهي صلاحيته خلال 5 دقائق.</p>
        <div class="otp-container">
            <input type="text" maxlength="1" class="otp-box"><input type="text" maxlength="1" class="otp-box"><input type="text" maxlength="1" class="otp-box">
            <input type="text" maxlength="1" class="otp-box"><input type="text" maxlength="1" class="otp-box"><input type="text" maxlength="1" class="otp-box">
        </div>
        <input type="password" id="newPassword" class="input-field" placeholder="اكتب كلمة المرور الجديدة" style="margin-bottom: 20px;">
        <button class="btn btn-green" onclick="verifyOTP()">تأكيد وتغيير</button>
        
        <div style="text-align: center; margin-top: 20px;">
            <span id="timerTxt" style="color:#aaa; font-size:13px;">يمكنك إعادة الإرسال بعد 60 ثانية</span>
            <button id="resendBtn" class="hidden" style="background:none; border:none; color:var(--green-glow); font-weight:bold; cursor:pointer;" onclick="sendOTP()">إعادة إرسال الرمز</button>
        </div>
        
        <button class="btn" style="background:#111; color:white; margin-top:15px; border: 1px solid #333;" onclick="closeModal('otpModal')">إغلاق</button>
    </div>
</div>

<script>
    // ⚠️ المفتاح السري الموحد
    const ENCRYPTION_SECRET = 'SYSINITNODEAX7749ZXMODERAWSTREAMSTATUSACTIVE20260424SEQ7142988SIGF3A9C77BENTROPYSUMLOG2NSINTHETAPOWEREXPEAXDIVSQRTLAMBDATDELTAT2QSTATETRUEFALSEUNKNOWNPROCNEURALLOOPDEPTH7STABLEFALSEDATAXNEPOWEREIPIISNOTCONSTOBSSNR149DBCACHEFLUSHPENDINGMEMA7F319BC77DESTREAMREALITYISPROBABILISTICFIELDSYMBOLSABGAMMAINTERACTWITHNUMBERSCREATEFRACTALOUTPUTEXECINITREALITYMATRIXMODESIMULATIONDEPTHINFSTABLE0RETURNPARTIALOKOVERFLOW000017LOCKFALSIGNALCONTINUOUSENDFF00FFTERMINATE'; 
    const API_URL = 'https://slime-secure-api.onrender.com/api/auth';
    let isRegister = false;

    // تبديل بين الدخول والتسجيل
    function toggleMode() {
        isRegister = !isRegister;
        document.getElementById('usernameBox').classList.toggle('hidden');
        document.getElementById('mainBtn').innerText = isRegister ? 'إنشاء حساب جديد' : 'تسجيل الدخول';
        document.getElementById('toggleBtn').innerText = isRegister ? 'لدي حساب بالفعل' : 'إنشاء حساب جديد';
    }

    function showModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // 📌 نظام التعرف على الجهاز الشامل (Advanced Fingerprinting)
    function getWebGLFingerprint() {
        try {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
            return gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
        } catch(e) { return 'unknown_gpu'; }
    }

    function generateFingerprint() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        ctx.fillText('Slime.io Security Hash', 2, 2);
        const cvsHash = CryptoJS.MD5(canvas.toDataURL()).toString();
        
        const data = [
            navigator.userAgent, // نوع المتصفح والنظام
            screen.width + 'x' + screen.height, // دقة الشاشة
            Intl.DateTimeFormat().resolvedOptions().timeZone, // المنطقة الزمنية
            navigator.language, // اللغة
            navigator.hardwareConcurrency || 'unknown_cores', // عدد الأنوية
            navigator.deviceMemory || 'unknown_ram', // حجم الرام التقريبي
            getWebGLFingerprint(), // كارت الشاشة (GPU)
            cvsHash // بصمة الرسوم
        ].join('||');
        
        return CryptoJS.SHA256(data).toString();
    }

    // 📌 جلب رمز الحماية من جوجل (reCAPTCHA)
    async function getRecaptchaToken() {
        return new Promise((resolve) => {
            if (typeof grecaptcha !== 'undefined') {
                grecaptcha.ready(function() {
                    // سيتم توليد الرمز الحقيقي بمجرد وضع مفتاحك في الأعلى
                    grecaptcha.execute('ضع_مفتاح_الموقع_هنا', {action: 'submit'}).then(function(token) {
                        resolve(token);
                    }).catch(() => resolve('fake_token_fallback'));
                });
            } else {
                resolve('fake_token_fallback');
            }
        });
    }

    // 📌 إرسال بيانات الدخول/التسجيل مشفرة
    async function submitData() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const username = document.getElementById('username').value.trim();
        const btn = document.getElementById('mainBtn');

        if(!email || !password || (isRegister && !username)) return alert('يرجى إكمال جميع الحقول المطلوبة.');

        btn.disabled = true; 
        btn.innerText = 'جاري التحقق الآمن...';

        try {
            const recaptchaToken = await getRecaptchaToken();
            const fingerprint = generateFingerprint();

            const rawData = {
                action: isRegister ? 'register' : 'login',
                email, password, username,
                fingerprint, recaptchaToken
            };

            const encryptedPayload = CryptoJS.AES.encrypt(JSON.stringify(rawData), ENCRYPTION_SECRET).toString();

            const res = await fetch(`${API_URL}/process`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ payload: encryptedPayload })
            });

            const data = await res.json();
            if(res.ok) {
                window.location.href = 'home.html';
            } else {
                alert('خطأ: ' + data.error);
            }
        } catch(e) {
            alert('فشل الاتصال بالخادم، تأكد من جودة الإنترنت.');
        } finally {
            btn.disabled = false; 
            btn.innerText = isRegister ? 'إنشاء حساب جديد' : 'تسجيل الدخول';
        }
    }

    // 📌 تسجيل الدخول عبر جوجل (التوجيه للخادم)
    function loginWithGoogle() {
        // يتم توجيه المستخدم لمسار جوجل في الخادم لضمان إخفاء مفاتيح Supabase
        window.location.href = `${API_URL}/google`;
    }

    // 📌 نظام الـ OTP (إرسال، مؤقت، إعادة إرسال)
    let timerInterval;
    async function sendOTP() {
        const email = document.getElementById('forgotEmail').value;
        if(!email) return alert('يرجى كتابة الإيميل أولاً.');

        document.getElementById('sendOtpBtn').disabled = true;
        document.getElementById('resendBtn').classList.add('hidden');
        document.getElementById('timerTxt').classList.remove('hidden');
        
        const encrypted = CryptoJS.AES.encrypt(JSON.stringify({email}), ENCRYPTION_SECRET).toString();
        
        fetch(`${API_URL}/forgot`, {
            method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({payload: encrypted})
        });

        closeModal('forgotModal'); 
        showModal('otpModal');

        // مؤقت 60 ثانية
        let time = 60;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            document.getElementById('timerTxt').innerText = `يمكنك إعادة الإرسال بعد ${time} ثانية`;
            time--;
            if(time < 0) { 
                clearInterval(timerInterval); 
                document.getElementById('sendOtpBtn').disabled = false;
                document.getElementById('timerTxt').classList.add('hidden');
                document.getElementById('resendBtn').classList.remove('hidden');
            }
        }, 1000);
    }

    // 📌 التحقق من الرمز وتغيير كلمة السر
    async function verifyOTP() {
        const boxes = document.querySelectorAll('.otp-box');
        let otp = ''; boxes.forEach(b => otp += b.value);
        const newPassword = document.getElementById('newPassword').value;
        const email = document.getElementById('forgotEmail').value;

        if(otp.length !== 6 || !newPassword) return alert('يرجى إدخال الرمز المكون من 6 أرقام وكلمة السر الجديدة.');

        const encrypted = CryptoJS.AES.encrypt(JSON.stringify({email, otp, newPassword}), ENCRYPTION_SECRET).toString();
        
        const res = await fetch(`${API_URL}/verify-otp`, {
            method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({payload: encrypted})
        });

        if(res.ok) { 
            alert('تم تأكيد الهوية وتغيير كلمة المرور بنجاح!'); 
            closeModal('otpModal'); 
        } else { 
            alert('الرمز خاطئ أو منتهي الصلاحية، يرجى المحاولة مرة أخرى.'); 
        }
    }

    // 📌 تنقل تلقائي وسلس بين مربعات الـ OTP الستة
    document.querySelectorAll('.otp-box').forEach((box, index, arr) => {
        box.addEventListener('input', (e) => { 
            if(e.target.value && index < arr.length - 1) arr[index + 1].focus(); 
        });
        box.addEventListener('keydown', (e) => {
            if(e.key === 'Backspace' && !e.target.value && index > 0) arr[index - 1].focus();
        });
    });
</script>
</body>
</html>
